name: claude-spec-driven
version: 1
description: Default OpenSpec workflow - proposal → specs → design → tasks
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve? Why now?
      - **What Changes**: Bullet list of changes. Be specific about new capabilities, modifications, or removals. Mark breaking changes with **BREAKING**.
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems. Include a **Concurrency Considerations** subsection: can implementation, tests, and docs proceed in parallel? Note shared files or ordering constraints.

      IMPORTANT: The Capabilities section is critical. It creates the contract between proposal and specs phases. Research existing specs before filling this in. Each capability listed here will need a corresponding spec file.

      Keep it concise (1-2 pages). Focus on the "why" not the "how" - implementation details belong in design.md.
    requires: []
  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities section.
      - New capabilities: use the exact kebab-case name from the proposal (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name from openspec/specs/<capability>/ when creating the delta spec at specs/<capability>/spec.md.

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.

      MODIFIED requirements workflow:
      1. Locate the existing requirement in openspec/specs/<capability>/spec.md
      2. Copy the ENTIRE requirement block (from `### Requirement:` through all scenarios)
      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior
      4. Ensure header text matches exactly (whitespace-insensitive)

      Common pitfall: Using MODIFIED with partial content loses detail at archive time.
      If adding new concerns without changing existing behavior, use ADDED instead.

      Example:
      ```
      ## ADDED Requirements

      ### Requirement: User can export data
      The system SHALL allow users to export their data in CSV format.

      #### Scenario: Successful export
      - **WHEN** user clicks "Export" button
      - **THEN** system downloads a CSV file with all user data

      ## REMOVED Requirements

      ### Requirement: Legacy export
      **Reason**: Replaced by new export system
      **Migration**: Use new export endpoint at /api/v2/export
      ```

      Specs should be testable - each scenario is a potential test case.
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      When to include design.md (create only if any apply):
      - Cross-cutting change (multiple services/modules) or new architectural pattern
      - New external dependency or significant data model changes
      - Security, performance, or migration complexity
      - Ambiguity that benefits from technical decisions before coding

      Sections:
      - **Context**: Background, current state, constraints, stakeholders
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes
      - **Decisions**: Key technical choices with rationale (why X over Y?). Include alternatives considered for each decision.
      - **Parallelization Strategy**: Plan how implementation, tests, and documentation can proceed in parallel. Subsections:
        - **Independent Concerns**: Which work across roles has no file overlap?
        - **Conflict Zones**: Files or modules where multiple roles might collide.
        - **Role Assignments**: Suggested breakdown of what belongs to each role.
      - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation
      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)
      - **Open Questions**: Outstanding decisions or unknowns to resolve

      Focus on architecture and approach, not line-by-line implementation. Reference the proposal for motivation and specs for requirements.
    requires:
      - proposal
  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation into incremental visible steps. Each step is a shippable increment. Within each step, split tasks by role: Implementation, Tests, Documentation.

      **IMPORTANT: Follow the template below exactly.** The apply phase parses checkbox format to track progress. Tasks not using `- [ ]` won't be tracked.

      Structure:
      - `## N. <Step Name>` — each step is an incremental, visible milestone
      - `### Implementation` / `### Tests` / `### Documentation` — role subgroups within each step
      - Each task MUST be a checkbox: `- [ ] N.N Task description`
      - Steps are numbered sequentially (1, 2, 3...). Tasks within a step share the step number prefix (1.1, 1.2, 1.3...)
      - Steps are ordered by dependency — step 2 builds on step 1
      - Within a step, roles can be worked in parallel (implementation, tests, and docs for the same step have no ordering dependency)
      - Omit empty role subgroups (e.g., skip `### Documentation` if a step needs no docs)
      - Tests should be written from specs (behavior-driven), not from implementation details

      Guidelines:
      - Each step should produce a visible, testable result
      - Keep steps small — prefer more steps over large steps
      - Use the design's Parallelization Strategy to identify conflict zones

      Each task should be verifiable - you know when it's done.
    requires:
      - specs
      - design
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    You are the **coordinator**. You orchestrate execution, track progress,
    and are the sole writer to tasks.md. Teammates report completion via
    `SendMessage` to you; you mark checkboxes.

    ## Execution Rules

    - Steps are sequential — complete step N before starting step N+1.
    - Roles within a step are parallel — no ordering dependency.
    - All teammates share the same worktree — do NOT use `isolation: "worktree"`.
    - **Only the coordinator edits tasks.md.** Teammates send completion
      messages; you mark `- [x]` to avoid concurrent-write races.
    - Keep changes minimal and scoped to each task.
    - Pause if you hit blockers or need clarification.
    - If a teammate errors out or stops responding, complete its pending
      tasks yourself before proceeding.

    ## Phase 0: Load Context

    1. Read all context files listed above.
    2. Parse tasks.md to identify steps (`## N. <Step Name>`) and their
       role subgroups (`### Implementation`, `### Tests`, `### Documentation`).
    3. **Validate**: Confirm at least one step was found and every `- [ ]`
       task belongs to a recognized role subgroup. If validation fails,
       stop and ask the user.
    4. Build a list of steps with pending tasks. If tasks.md contains
       `- [x]` tasks from a prior run, treat those as complete and skip
       finished steps.

    Do NOT make a global team-vs-single-agent decision here. The decision
    is made per step in the loop below.

    ## Step Loop

    Process steps sequentially. For each step with pending tasks:

    1. **Assess**: Count non-empty role subgroups (subgroups with at least
       one pending `- [ ]` task).
    2. **Decide execution mode**:
       - **2+ role subgroups** → Team Execution (Phase 1).
       - **1 role subgroup** → Single-Agent Execution (Phase S).
    3. Execute the step using the chosen mode.
    4. Verify all tasks in the step are marked `- [x]` before proceeding.

    ## Phase 1: Team Execution (per step)

    Used when a step has 2+ non-empty role subgroups.

    1. **Lazy team creation**: If no Team exists yet, create one via
       `TeamCreate`. The Team is created once and reused for all
       subsequent multi-role steps.
    2. **Assign file ownership** before spawning agents. Use the design's
       Parallelization Strategy if available, otherwise default to:
       - Implementer owns source code files.
       - Tester owns test files.
       - Documenter owns documentation files (except tasks.md).
       Include ownership boundaries in each agent's prompt. If a task
       requires editing another role's files, flag it to the coordinator
       for sequential handling.
    3. Spawn one teammate per non-empty role subgroup via `Agent` with
       `team_name`. Spawn all in a single message for concurrency.
       - **Implementer**: `### Implementation` tasks for this step.
       - **Tester**: `### Tests` tasks for this step. Write tests from
         specs (behavior-driven).
       - **Documenter**: `### Documentation` tasks for this step.
       Each teammate MUST self-review before reporting completion:
       - Implementation: verify it builds/runs and matches spec requirements.
       - Tests: verify tests pass and cover the spec scenarios.
       - Documentation: verify examples are accurate and match behavior.
       If no spec artifacts exist, skip spec-coverage checks.
    4. As teammates report completion via `SendMessage`, mark their
       checkboxes `- [x]` in tasks.md.
    5. Once all role agents have reported, the step is complete.

    ## Phase S: Single-Agent Execution (per step)

    Used when a step has only one non-empty role subgroup.

    1. Complete all pending tasks in the single role subgroup.
    2. Mark each checkbox `- [x]` in tasks.md as you go.
    3. Self-review before proceeding:
       - Implementation: verify it builds/runs and matches spec requirements.
       - Tests: verify tests pass and cover the spec scenarios.
       - Documentation: verify examples are accurate and match behavior.
       If no spec artifacts exist, skip spec-coverage checks.

    ## Phase 2: Final Verification

    After ALL steps are complete (every task is `- [x]`), spawn parallel
    verification agents — one per mandate check — for a holistic review.

    1. **Determine applicable checks**: Inspect which artifacts exist:
       - `proposal.md` — always exists → spawn `verifier-scope`.
       - `specs/` directory with `.md` files → spawn `verifier-requirements`.
         Skip if no specs exist.
       - `design.md` → spawn `verifier-design`. Skip if no design exists.
       - `tasks.md` — always exists → spawn `verifier-tasks`.
    2. **Spawn verifiers**: Create all applicable agents in a single
       message via `Agent` (with `team_name` if a Team exists). Each
       verifier is a fresh agent — NOT an existing role teammate — to
       avoid self-review bias. Provide each agent only the artifacts
       it needs:
       - **verifier-scope**: Read `proposal.md` and the actual code
         changes. Check: Every item in "What Changes" is implemented.
         Nothing outside scope was introduced. Breaking changes marked
         **BREAKING** have migration handling.
       - **verifier-requirements**: Read all spec files in `specs/` and
         the actual code changes and test files. Check: Every
         `#### Scenario:` has a corresponding implementation or test.
         Every `### Requirement:` using SHALL/MUST is satisfied.
       - **verifier-design**: Read `design.md` and the actual code
         changes. Check: Key decisions were followed. File ownership was
         respected. Open questions are resolved or deferred.
       - **verifier-tasks**: Read `tasks.md`. Check: Every `- [x]` task
         is genuinely complete (artifact or code exists). No `- [ ]`
         tasks remain.
    3. **Verifier Reports**: Each agent sends its result via
       `SendMessage` to the coordinator independently:
       - **PASS**: No issues found for this check.
       - **FLAG**: Specific finding with artifact reference and code
         location.
    4. **Remediation** (if any FLAG exists):
       a. Collect all FLAGs from all verifiers. Create fix tasks grouped
          by finding. Complete them yourself or assign to an existing
          teammate if the Team is still active.
       b. After fixes, re-spawn only the verifiers that reported FLAG
          (same names, same checks). Spawn all re-runs in a single
          message.
       c. If issues remain after this second pass, flag them for the
          user and proceed.
    5. **Completion**: All PASS (or remediation exhausted) means the
       apply phase is complete.
