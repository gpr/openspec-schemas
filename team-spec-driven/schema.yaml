name: team-spec-driven
version: 1
description: Team Spec Driven workflow - proposal → specs → design → tasks
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      **Component Discovery**: Read the Mermaid `C4Component` diagram from the project's CLAUDE.md.
      Extract each `Component(alias, "Label", ...)` entry and their `Rel(...)` / `BiRel(...)` edges.
      Components are grouped inside `Container_Boundary(alias, "Label")` blocks.

      **C4Component Cheat-Sheet** (for parsing the diagram):
      - Diagram keyword: `C4Component`
      - Components: `Component(alias, "Label", ?techn, ?descr)` — variants: `ComponentDb`, `ComponentQueue`, `Component_Ext`
      - Boundaries: `Container_Boundary(alias, "Label") { ... }` — groups components by container
      - Relationships: `Rel(from, to, "label", ?techn)` — variants: `BiRel`, `Rel_Back`, directional: `Rel_U`, `Rel_D`, `Rel_L`, `Rel_R`
      - `from`/`to` in `Rel(...)` reference the `alias` parameter of `Component(...)` definitions

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve? Why now?
      - **What Changes**: Bullet list of changes. Be specific about new capabilities, modifications, or removals. Mark breaking changes with **BREAKING**.
      - **Components Affected**: Table listing each affected component, its container boundary,
        and cross-component relationships. One row per component.
      - **Contracts**: List cross-component contracts.
        Each contract becomes a spec owned by the Leader. Use `contract-` prefix for naming
        (e.g., `contract-auth-api`, `contract-event-schema`).
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`.
          Use component-prefixed kebab-case names (e.g., `front-user-auth`, `api-data-export`).
          Contract capabilities use `contract-` prefix (e.g., `contract-auth-api`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      IMPORTANT: The Capabilities section is critical. It creates the contract between
      proposal and specs phases. Research existing specs before filling this in.
      Each capability listed here will need a corresponding spec file.

      Keep it concise (1-2 pages). Focus on the "why" not the "how" -
      implementation details belong in design.md.

      This is the foundation - specs, design, and tasks all build on this.
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities section.
      - New capabilities: use the exact kebab-case name from the proposal (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name from openspec/specs/<capability>/ when creating the delta spec at specs/<capability>/spec.md.

      **YAML Front Matter**: Every spec file MUST begin with YAML front matter:
      ```
      ---
      name: <capability-name>
      description: <one-line summary>
      component: <component-name or "contract">
      dependencies: [<list of spec names this depends on>]
      ---
      ```
      - **Contract specs** (`component: contract`): Owned by the Leader. Created FIRST.
        Define data shapes, API signatures, and event schemas shared across components.
      - **Component specs** (`component: <name>`): Must be independently understandable by
        a Teammate who only sees contract specs + their own component's specs.

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.

      MODIFIED requirements workflow:
      1. Locate the existing requirement in openspec/specs/<capability>/spec.md
      2. Copy the ENTIRE requirement block (from `### Requirement:` through all scenarios)
      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior
      4. Ensure header text matches exactly (whitespace-insensitive)

      Common pitfall: Using MODIFIED with partial content loses detail at archive time.
      If adding new concerns without changing existing behavior, use ADDED instead.

      Example:
      ```
      ---
      name: contract-auth-api
      description: Authentication API contract between frontend and API gateway
      component: contract
      dependencies: []
      ---

      ## ADDED Requirements

      ### Requirement: User can export data
      The system SHALL allow users to export their data in CSV format.

      #### Scenario: Successful export
      - **WHEN** user clicks "Export" button
      - **THEN** system downloads a CSV file with all user data

      ## REMOVED Requirements

      ### Requirement: Legacy export
      **Reason**: Replaced by new export system
      **Migration**: Use new export endpoint at /api/v2/export
      ```

      Specs should be testable - each scenario is a potential test case.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      When to include design.md (create only if any apply):
      - Cross-cutting change (multiple services/modules) or new architectural pattern
      - New external dependency or significant data model changes
      - Security, performance, or migration complexity
      - Ambiguity that benefits from technical decisions before coding

      Sections:
      - **Context**: Background, current state, constraints, stakeholders
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes
      - **Component Dependency Map**: Table showing each component and the contracts it depends on.
        Columns: Component | Depends On (contracts) | Direction.
      - **Contracts** (Leader-owned): One subsection per contract. Define data shapes, API signatures,
        error handling, and versioning. These are implemented FIRST before any component work begins.
      - **Component Design**: One `### <Component Name>` subsection per affected component.
        Each includes: goals for this component, key decisions, implementation approach.
        Must be self-contained — a Teammate reads only this subsection + Contracts.
      - **File Ownership Table**: Maps every file or directory touched by this change to exactly
        one component. Prevents merge conflicts during parallel work. Format: Path | Component | Notes.
      - **Decisions**: Key technical choices with rationale (why X over Y?). Include alternatives considered for each decision.
      - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation
      - **Open Questions**: Outstanding decisions or unknowns to resolve

      Focus on architecture and approach, not line-by-line implementation.
      Reference the proposal for motivation and specs for requirements.

      Good design docs explain the "why" behind technical decisions.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      **IMPORTANT: Follow the template below exactly.** The apply phase parses
      checkbox format to track progress. Tasks not using `- [ ]` won't be tracked.

      **Structure — contract-first, then parallel components:**
      - **Group 0: Contracts & Shared Interfaces** — Leader-owned, runs FIRST.
        All component groups are blocked by this group completing.
      - **Groups 1-N: One per affected component** — run in PARALLEL by separate Teammates.
        Each group is self-contained (~5-6 tasks) and ends with a commit task.

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Tasks should be small enough to complete in one session
      - Each task touches files owned by ONE component only (per File Ownership Table in design.md)
      - Use `<!-- blockedBy: N.M -->` annotations for cross-group dependencies

      Example:
      ```
      ## 0. Contracts & Shared Interfaces

      - [ ] 0.1 Define auth API contract types
      - [ ] 0.2 Define event schema contract
      - [ ] 0.3 Commit: "feat: add cross-component contracts"

      ## 1. <!-- Frontend -->

      <!-- blockedBy: 0.3 -->
      - [ ] 1.1 Implement auth UI components
      - [ ] 1.2 Wire up auth API client using contract types
      - [ ] 1.3 Add unit tests
      - [ ] 1.4 Commit: "feat(frontend): add auth UI"

      ## 2. <!-- API Gateway -->

      <!-- blockedBy: 0.3 -->
      - [ ] 2.1 Implement auth endpoints per contract
      - [ ] 2.2 Add integration tests
      - [ ] 2.3 Commit: "feat(api): add auth endpoints"
      ```

      Reference specs for what needs to be built, design for how to build it.
      Each task should be verifiable - you know when it's done.
    requires:
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    First create a Worktree and then launch a Team with 1 Teammate per <component>.

    1. **Leader completes Group 0 first** — implement all contracts and shared interfaces.
       Only after Group 0 is fully committed should component work begin.
    2. **Teammates self-claim unblocked component groups** (Groups 1-N) and work in parallel.
       Each Teammate owns one component group.
    3. **File Ownership**: Only modify files listed under your component in the
       File Ownership Table (design.md). If you need a file outside your ownership,
       coordinate with the owning Teammate.
    4. **Respect `<!-- blockedBy: -->` annotations** — do not start a task until
       the referenced task is marked complete.
    5. Mark tasks complete as you go. Pause if you hit blockers or need clarification.
    6. Each Teammate commit its changes when completing it's tasks
